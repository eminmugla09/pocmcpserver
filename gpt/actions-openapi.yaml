openapi: 3.1.0
info:
  title: FPL EV ChatGPT Actions
  version: 1.0.0
  description: FPL EVolution Home customer service actions for account lookup, billing, EV enrollment, and service connections.
servers:
  - url: https://fplpoc.up.railway.app
paths:
  /actions/check_ev_eligibility:
    post:
      operationId: check_ev_eligibility
      summary: Check EV eligibility
      description: Return premise-specific FPL EVolution Home eligibility checks and recommended install type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [premise_number]
              properties:
                premise_number:
                  type: string
      responses:
        "200":
          description: Eligibility check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  eligible:
                    type: boolean
                  recommendedInstallType:
                    type: string
                    enum: [full, equipment_only]
                  premiseNumber:
                    type: string
  /actions/enroll_ev_charging:
    post:
      operationId: enroll_ev_charging
      summary: Enroll in EV charging
      description: Starts FPL EVolution Home enrollment for a premise.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [premise_number, install_type]
              properties:
                premise_number:
                  type: string
                install_type:
                  type: string
                  enum: [full, equipment_only]
      responses:
        "200":
          description: Enrollment result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  request:
                    type: object
                  enrollmentId:
                    type: string
  /actions/get_account_summary:
    post:
      operationId: get_account_summary
      summary: Get account summary
      description: Return account status, standing, rate class, smart meter status, enrolled programs and flags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_number]
              properties:
                account_number:
                  type: string
      responses:
        "200":
          description: Account summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountNumber:
                    type: string
                  status:
                    type: string
                  standing:
                    type: string
                  rateClass:
                    type: string
                  smartMeterFlag:
                    type: boolean
                  enrolledPrograms:
                    type: array
                    items:
                      type: string
  /actions/get_billing_inquiry:
    post:
      operationId: get_billing_inquiry
      summary: Get billing inquiry
      description: Return current bill, due date, charge breakdown, kWh usage and EV off-peak savings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_number]
              properties:
                account_number:
                  type: string
      responses:
        "200":
          description: Billing information
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountNumber:
                    type: string
                  currentBill:
                    type: number
                  dueDate:
                    type: string
                  charges:
                    type: array
                    items:
                      type: object
                  kWhUsage:
                    type: number
                  evOffPeakSavings:
                    type: number
  /actions/get_customer_profile:
    post:
      operationId: get_customer_profile
      summary: Get customer profile
      description: Identify the customer and return linked accounts, premises and registered EVs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_number:
                  type: string
                phone:
                  type: string
                email:
                  type: string
      responses:
        "200":
          description: Customer profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  customerNumber:
                    type: string
                  accounts:
                    type: array
                    items:
                      type: object
                  premises:
                    type: array
                    items:
                      type: object
  /actions/get_ev_enrollment:
    post:
      operationId: get_ev_enrollment
      summary: Get EV enrollment
      description: Return FPL EVolution Home enrollment and charger details for an account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_number]
              properties:
                account_number:
                  type: string
      responses:
        "200":
          description: EV enrollment details
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrolled:
                    type: boolean
                  chargerDetails:
                    type: object
  /actions/get_payment_history:
    post:
      operationId: get_payment_history
      summary: Get payment history
      description: Return recent payment history and AutoPay scheduling details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_number]
              properties:
                account_number:
                  type: string
      responses:
        "200":
          description: Payment history
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      type: object
                  autopayEnrolled:
                    type: boolean
                  nextScheduledPaymentDate:
                    type: string
  /actions/get_premise_details:
    post:
      operationId: get_premise_details
      summary: Get premise details
      description: Return premise details by premise number or service address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                premise_number:
                  type: string
                address:
                  type: string
      responses:
        "200":
          description: Premise details
          content:
            application/json:
              schema:
                type: object
                properties:
                  premiseNumber:
                    type: string
                  address:
                    type: object
                  propertyType:
                    type: string
                  serviceStatus:
                    type: string
                  smartMeterFlag:
                    type: boolean
                  evolutionHomeEligible:
                    type: boolean
                  evolutionHomeEnrolled:
                    type: boolean
  /actions/get_service_connection_quote:
    post:
      operationId: get_service_connection_quote
      summary: Get service connection quote
      description: Return move-in connection quote, deposit status and earliest connection date for a premise.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [premise_number]
              properties:
                premise_number:
                  type: string
      responses:
        "200":
          description: Connection quote
          content:
            application/json:
              schema:
                type: object
                properties:
                  premiseNumber:
                    type: string
                  depositRequired:
                    type: boolean
                  depositAmount:
                    type: number
                  earliestConnectDate:
                    type: string
                  connectionFee:
                    type: number
  /actions/get_usage_history:
    post:
      operationId: get_usage_history
      summary: Get usage history
      description: Return monthly kWh, cost and EV charging kWh trend history.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_number]
              properties:
                account_number:
                  type: string
      responses:
        "200":
          description: Usage history
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    month:
                      type: string
                    kWh:
                      type: number
                    cost:
                      type: number
                    evChargingKWh:
                      type: number
  /actions/match_property_to_customer:
    post:
      operationId: match_property_to_customer
      summary: Match property to customer
      description: Simulate matching a North Palm Beach property-registration event to the synthetic customer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address:
                  type: string
      responses:
        "200":
          description: Property matching result
          content:
            application/json:
              schema:
                type: object
                properties:
                  matched:
                    type: boolean
                  matchedCustomer:
                    type: string
                  premiseNumber:
                    type: string
                  event:
                    type: string
  /actions/set_move_intent:
    post:
      operationId: set_move_intent
      summary: Set move intent
      description: Mock action that records whether the customer is keeping both homes or moving out of Miami.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [intent]
              properties:
                intent:
                  type: string
                  enum: [keep_both, move_out_miami]
      responses:
        "200":
          description: Move intent result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  request:
                    type: object
                  recordedIntent:
                    type: string
  /actions/start_service_connection:
    post:
      operationId: start_service_connection
      summary: Start service connection
      description: Mock action that submits a new residential power connection request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [premise_number]
              properties:
                premise_number:
                  type: string
                account_number:
                  type: string
                requested_connect_date:
                  type: string
      responses:
        "200":
          description: Service connection result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  request:
                    type: object
                  confirmationNumber:
                    type: string
