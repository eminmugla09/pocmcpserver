openapi: 3.1.0
info:
  title: FPL EV ChatGPT POC MCP
  version: 0.3.0
  description: Railway-hosted Streamable HTTP MCP endpoint for the data-backed FPL EV mock tools.
servers:
  - url: https://pocserver.up.railway.app
paths:
  /health:
    get:
      operationId: getHealth
      summary: Check MCP server health
      responses:
        "200":
          description: Server health response
          content:
            application/json:
              schema:
                type: object
                required: [status, mcpPath]
                properties:
                  status:
                    type: string
                    example: ok
                  mcpPath:
                    type: string
                    example: /mcp
  /mcp:
    post:
      operationId: postMcpJsonRpc
      summary: Call the MCP Streamable HTTP endpoint
      description: |
        Sends JSON-RPC requests to the MCP server. Use `initialize` first, then `tools/list` or `tools/call`.

        Available mock tool names include `get_customer_profile`, `get_account_summary`, `get_premise_details`,
        `get_billing_inquiry`, `get_payment_history`, `get_usage_history`, `get_ev_enrollment`,
        `check_ev_eligibility`, `match_property_to_customer`, `get_service_connection_quote`,
        `start_service_connection`, `enroll_ev_charging`, and `set_move_intent`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
            examples:
              initialize:
                summary: Initialize MCP session
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: initialize
                  params:
                    protocolVersion: "2025-03-26"
                    capabilities: {}
                    clientInfo:
                      name: curl-test
                      version: 0.0.1
              listTools:
                summary: List MCP tools
                value:
                  jsonrpc: "2.0"
                  id: 2
                  method: tools/list
                  params: {}
              getCustomerProfile:
                summary: Call get_customer_profile
                value:
                  jsonrpc: "2.0"
                  id: 3
                  method: tools/call
                  params:
                    name: get_customer_profile
                    arguments:
                      phone: 305-555-0142
              matchPropertyToCustomer:
                summary: Call match_property_to_customer
                value:
                  jsonrpc: "2.0"
                  id: 4
                  method: tools/call
                  params:
                    name: match_property_to_customer
                    arguments:
                      address: 320 Anchorage Dr, North Palm Beach, FL 33408
              checkEvEligibility:
                summary: Call check_ev_eligibility
                value:
                  jsonrpc: "2.0"
                  id: 5
                  method: tools/call
                  params:
                    name: check_ev_eligibility
                    arguments:
                      premise_number: "60587744"
      responses:
        "200":
          description: MCP JSON-RPC response, usually returned as text/event-stream by the Streamable HTTP transport.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: message
                  data: {"result":{"serverInfo":{"name":"fpl-agent-mcp","version":"0.2.0"}},"jsonrpc":"2.0","id":1}
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
        "405":
          description: Method not allowed. Use POST for /mcp.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcErrorResponse"
components:
  schemas:
    JsonRpcRequest:
      type: object
      required: [jsonrpc, id, method]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          oneOf:
            - type: string
            - type: integer
        method:
          type: string
          enum:
            - initialize
            - tools/list
            - tools/call
        params:
          type: object
          additionalProperties: true
    JsonRpcResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          example: "2.0"
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        result:
          type: object
          additionalProperties: true
        error:
          type: object
          additionalProperties: true
    JsonRpcErrorResponse:
      type: object
      required: [jsonrpc, error, id]
      properties:
        jsonrpc:
          type: string
          example: "2.0"
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: integer
            message:
              type: string
        id:
          type: "null"